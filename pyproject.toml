[project]
name = "boomi-mcp-server"
version = "0.1.0"
description = "MCP server exposing Boomi API via FastMCP"
requires-python = ">=3.10"

[project.dependencies]
boomi = "*"
fastmcp = "*"
pydantic = "*"
python-dotenv = "*"

[project.scripts]
boomi-mcp = "server:main"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
